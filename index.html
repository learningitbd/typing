<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Typing Master | Mechanical RGB Keyboard · Speed Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0a1a 0%, #0f0f1f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'JetBrains Mono', monospace;
            padding: 20px;
        }

        /* Main game container */
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px 28px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        /* header stats */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 12px 24px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 40px;
            padding: 8px 18px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffd966;
            font-family: 'JetBrains Mono', monospace;
        }
        .wpm-highlight {
            color: #6ee7b7;
            text-shadow: 0 0 8px #10b98180;
        }

        /* word display area */
        .word-area {
            text-align: center;
            margin: 30px 0 25px;
        }
        .target-word {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 6px;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, #fff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(192, 132, 252, 0.4);
            margin-bottom: 15px;
            word-break: break-word;
        }
        .input-area {
            margin-top: 15px;
        }
        #userInput {
            width: 100%;
            max-width: 550px;
            padding: 18px 24px;
            font-size: 1.6rem;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            background: #1e1f2e;
            border: 2px solid #3b3b5e;
            border-radius: 80px;
            color: white;
            outline: none;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        #userInput:focus {
            border-color: #a855f7;
            box-shadow: 0 0 20px #a855f780;
            background: #26273a;
        }
        .feedback {
            margin-top: 12px;
            font-size: 0.9rem;
            min-height: 40px;
            font-weight: 500;
        }
        .success {
            color: #4ade80;
        }
        .error {
            color: #f87171;
        }

        /* MECHANICAL RGB KEYBOARD */
        .keyboard-container {
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 32px;
            padding: 20px 15px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            overflow-x: auto;
        }
        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 700px;
        }
        .key-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .key {
            background: #1f1f2e;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #ddd;
            box-shadow: 0 3px 0 #0a0a12;
            transition: all 0.05s linear;
            min-width: 52px;
            cursor: default;
            position: relative;
            backdrop-filter: blur(2px);
        }
        /* RGB glow effect on keypress */
        .key.pressed {
            background: linear-gradient(145deg, #f0f, #a0f);
            box-shadow: 0 0 12px #f0f, 0 0 20px #a0f;
            color: white;
            transform: translateY(2px);
            transition: 0.03s;
        }
        /* Special keys width */
        .key.space {
            min-width: 280px;
        }
        .key.shift, .key.enter {
            min-width: 85px;
        }
        .key.ctrl, .key.alt {
            min-width: 65px;
        }
        .key.tab {
            min-width: 70px;
        }
        .key.caps {
            min-width: 75px;
        }
        /* Mechanical texture */
        .key::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 4px;
            right: 4px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        @keyframes rgbPulse {
            0% { text-shadow: 0 0 2px cyan; }
            100% { text-shadow: 0 0 12px magenta; }
        }

        /* Timer & Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 30px;
        }
        .game-btn {
            background: linear-gradient(135deg, #2d2d44, #1a1a2a);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .game-btn.primary {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            box-shadow: 0 4px 12px #6d28d980;
        }
        .game-btn:active {
            transform: scale(0.96);
        }
        .timer-ring {
            font-size: 1.2rem;
            background: #00000066;
            border-radius: 40px;
            padding: 8px 20px;
        }
        @media (max-width: 780px) {
            .target-word { font-size: 2.5rem; letter-spacing: 2px; }
            #userInput { font-size: 1.2rem; padding: 14px 18px; }
            .key { min-width: 40px; font-size: 0.7rem; padding: 8px 4px; }
            .key.space { min-width: 180px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats-bar">
        <div class="stat-card"><div class="stat-label">⏱️ TIME</div><div class="stat-value" id="timerDisplay">00:00</div></div>
        <div class="stat-card"><div class="stat-label">⚡ WPM</div><div class="stat-value" id="wpmDisplay">0</div></div>
        <div class="stat-card"><div class="stat-label">🎯 ACCURACY</div><div class="stat-value" id="accuracyDisplay">100%</div></div>
        <div class="stat-card"><div class="stat-label">📊 SCORE</div><div class="stat-value" id="scoreDisplay">0</div></div>
    </div>

    <div class="word-area">
        <div class="target-word" id="targetWord">typing</div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type the word here..." autocomplete="off">
        </div>
        <div class="feedback" id="feedbackMsg">✨ Press START & type fast! Mechanical RGB feedback ✨</div>
    </div>

    <!-- Mechanical RGB Keyboard Layout -->
    <div class="keyboard-container">
        <div class="keyboard" id="keyboardLayout">
            <!-- row 1 -->
            <div class="key-row">
                <div class="key" data-key="`">`</div><div class="key" data-key="1">1</div><div class="key" data-key="2">2</div><div class="key" data-key="3">3</div><div class="key" data-key="4">4</div><div class="key" data-key="5">5</div><div class="key" data-key="6">6</div><div class="key" data-key="7">7</div><div class="key" data-key="8">8</div><div class="key" data-key="9">9</div><div class="key" data-key="0">0</div><div class="key" data-key="-">-</div><div class="key" data-key="=">=</div><div class="key backspace" data-key="Backspace">⌫</div>
            </div>
            <!-- row 2 -->
            <div class="key-row">
                <div class="key tab" data-key="Tab">Tab</div><div class="key" data-key="q">Q</div><div class="key" data-key="w">W</div><div class="key" data-key="e">E</div><div class="key" data-key="r">R</div><div class="key" data-key="t">T</div><div class="key" data-key="y">Y</div><div class="key" data-key="u">U</div><div class="key" data-key="i">I</div><div class="key" data-key="o">O</div><div class="key" data-key="p">P</div><div class="key" data-key="[">[</div><div class="key" data-key="]">]</div><div class="key" data-key="\">\</div>
            </div>
            <!-- row 3 -->
            <div class="key-row">
                <div class="key caps" data-key="CapsLock">Caps</div><div class="key" data-key="a">A</div><div class="key" data-key="s">S</div><div class="key" data-key="d">D</div><div class="key" data-key="f">F</div><div class="key" data-key="g">G</div><div class="key" data-key="h">H</div><div class="key" data-key="j">J</div><div class="key" data-key="k">K</div><div class="key" data-key="l">L</div><div class="key" data-key=";">;</div><div class="key" data-key="'">'</div><div class="key enter" data-key="Enter">⏎</div>
            </div>
            <!-- row 4 -->
            <div class="key-row">
                <div class="key shift" data-key="ShiftLeft">Shift</div><div class="key" data-key="z">Z</div><div class="key" data-key="x">X</div><div class="key" data-key="c">C</div><div class="key" data-key="v">V</div><div class="key" data-key="b">B</div><div class="key" data-key="n">N</div><div class="key" data-key="m">M</div><div class="key" data-key=",">,</div><div class="key" data-key=".">.</div><div class="key" data-key="/">/</div><div class="key shift" data-key="ShiftRight">Shift</div>
            </div>
            <!-- row 5 -->
            <div class="key-row">
                <div class="key ctrl" data-key="ControlLeft">Ctrl</div><div class="key alt" data-key="AltLeft">Alt</div><div class="key space" data-key=" ">␣</div><div class="key alt" data-key="AltRight">Alt</div><div class="key ctrl" data-key="ControlRight">Ctrl</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="game-btn primary" id="startBtn">▶ START GAME</button>
        <button class="game-btn" id="resetBtn">🔄 RESET</button>
        <div class="timer-ring" id="modeIndicator">⚡ 60s Mode</div>
    </div>
</div>

<script>
    // -------------------- TYPING MASTER GAME --------------------
    // Word bank (common words for fast typing)
    const WORDS = [
        "speed", "master", "keyboard", "mechanical", "rgb", "lightning", "focus", "accuracy", "velocity",
        "typing", "challenge", "react", "precision", "rapid", "neon", "glitch", "pixel", "nexus", "quantum",
        "fire", "storm", "cyber", "fusion", "dynamic", "swift", "blitz", "zenith", "luminous", "strike"
    ];
    
    let gameActive = false;
    let timeLeft = 60;          // seconds
    let timerInterval = null;
    let currentWord = "";
    let totalTyped = 0;
    let correctCount = 0;
    let startTime = 0;
    let currentWPM = 0;
    
    // DOM elements
    const targetWordEl = document.getElementById("targetWord");
    const userInput = document.getElementById("userInput");
    const timerDisplay = document.getElementById("timerDisplay");
    const wpmDisplay = document.getElementById("wpmDisplay");
    const accuracyDisplay = document.getElementById("accuracyDisplay");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const feedbackMsg = document.getElementById("feedbackMsg");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const modeIndicator = document.getElementById("modeIndicator");
    
    // Helper: get random word
    function getRandomWord() {
        return WORDS[Math.floor(Math.random() * WORDS.length)];
    }
    
    // update UI stats
    function updateStats() {
        // calculate accuracy
        let accuracy = totalTyped === 0 ? 100 : (correctCount / totalTyped) * 100;
        accuracyDisplay.innerText = Math.round(accuracy) + "%";
        scoreDisplay.innerText = correctCount;
        
        // WPM calculation: (correct words per minute) based on elapsed time
        if (gameActive && startTime > 0) {
            const elapsedMinutes = (60 - timeLeft) / 60;
            if (elapsedMinutes > 0) {
                let rawWPM = Math.round(correctCount / elapsedMinutes);
                currentWPM = rawWPM;
                wpmDisplay.innerText = currentWPM;
            } else {
                wpmDisplay.innerText = "0";
            }
        } else {
            wpmDisplay.innerText = "0";
        }
        // timer display format
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }
    
    // load new word
    function loadNewWord() {
        currentWord = getRandomWord();
        targetWordEl.innerText = currentWord;
        userInput.value = "";
        // remove any feedback class
        feedbackMsg.classList.remove("success", "error");
    }
    
    // handle word submission (check match)
    function checkWord() {
        if (!gameActive) return;
        const typed = userInput.value.trim();
        if (typed === "") return;
        
        totalTyped++;
        if (typed === currentWord) {
            // correct
            correctCount++;
            feedbackMsg.innerHTML = "✅ CORRECT! +1 WPM boost!";
            feedbackMsg.classList.add("success");
            feedbackMsg.classList.remove("error");
            // RGB flash effect on keyboard for fun
            flashKeyboardRGB();
            loadNewWord();
        } else {
            feedbackMsg.innerHTML = `❌ WRONG! Expected "${currentWord}" | keep typing!`;
            feedbackMsg.classList.add("error");
            feedbackMsg.classList.remove("success");
            // Wrong word: still increments totalTyped but not correctCount
            // give slight shake? we just clear input but keep word
            userInput.value = "";
            userInput.classList.add("error");
            setTimeout(() => userInput.classList.remove("error"), 300);
            // but we don't load new word, user must retype correct word? better reset input and let them try again.
            // For better UX: clear and keep same word
            userInput.value = "";
            feedbackMsg.innerText = `❌ Try again! Type: "${currentWord}"`;
            setTimeout(() => {
                if (gameActive) feedbackMsg.classList.remove("error");
            }, 800);
            updateStats();
            return;
        }
        updateStats();
        // extra check for game end
        if (timeLeft <= 0) endGame();
    }
    
    // flash mechanical keyboard with RGB effect
    function flashKeyboardRGB() {
        // create temporary random RGB effect on all keys
        const keys = document.querySelectorAll('.key');
        keys.forEach(key => {
            const randomColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
            key.style.transition = '0.08s';
            key.style.boxShadow = `0 0 12px ${randomColor}`;
            key.style.backgroundColor = randomColor;
            setTimeout(() => {
                key.style.boxShadow = '';
                key.style.backgroundColor = '';
            }, 120);
        });
    }
    
    // highlight specific key when pressed (real keyboard simulation)
    function highlightKey(keyValue) {
        let keyElement = null;
        // map key values to data-key attribute
        const keyMap = {
            ' ': ' ', 'Backspace': 'Backspace', 'Enter': 'Enter', 'Tab': 'Tab', 'Shift': 'ShiftLeft', 'Control': 'ControlLeft', 'Alt': 'AltLeft'
        };
        let searchKey = keyValue;
        if (keyValue === 'Shift') searchKey = 'ShiftLeft';
        if (keyValue === 'Control') searchKey = 'ControlLeft';
        if (keyValue === 'Alt') searchKey = 'AltLeft';
        
        const keys = document.querySelectorAll('.key');
        for (let k of keys) {
            if (k.getAttribute('data-key') === searchKey || k.innerText.toLowerCase() === keyValue.toLowerCase() || (keyValue.length === 1 && k.innerText.toLowerCase() === keyValue.toLowerCase())) {
                keyElement = k;
                break;
            }
        }
        if (!keyElement && keyValue.length === 1) {
            // fallback: search inner text
            keys.forEach(k => { if (k.innerText.toLowerCase() === keyValue.toLowerCase()) keyElement = k; });
        }
        if (keyElement) {
            keyElement.classList.add('pressed');
            // random rgb flash per key
            const rgbGlow = `hsl(${Math.random() * 360}, 100%, 65%)`;
            keyElement.style.boxShadow = `0 0 14px ${rgbGlow}`;
            setTimeout(() => {
                keyElement.classList.remove('pressed');
                keyElement.style.boxShadow = '';
            }, 100);
        }
    }
    
    // Timer countdown
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameActive && timeLeft > 0) {
                timeLeft--;
                updateStats();
                if (timeLeft === 0) {
                    endGame();
                }
            } else if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }
    
    function endGame() {
        gameActive = false;
        if (timerInterval) clearInterval(timerInterval);
        userInput.disabled = true;
        let finalWPM = currentWPM;
        let accuracy = totalTyped === 0 ? 100 : (correctCount / totalTyped) * 100;
        feedbackMsg.innerHTML = `🏆 GAME OVER! Final WPM: ${finalWPM} | Accuracy: ${Math.round(accuracy)}% | Words: ${correctCount}`;
        feedbackMsg.classList.add("success");
        startBtn.innerText = "▶ PLAY AGAIN";
        modeIndicator.innerText = "✅ Game Finished";
    }
    
    function startGame() {
        if (timerInterval) clearInterval(timerInterval);
        gameActive = true;
        timeLeft = 60;
        totalTyped = 0;
        correctCount = 0;
        currentWPM = 0;
        updateStats();
        loadNewWord();
        userInput.disabled = false;
        userInput.value = "";
        userInput.focus();
        startTimer();
        startTime = Date.now();
        feedbackMsg.innerHTML = "⚡ GAME ACTIVE! Type the words as fast as you can! RGB Keyboard reacting!";
        feedbackMsg.classList.remove("error", "success");
        startBtn.innerText = "▶ GAME ACTIVE";
        modeIndicator.innerText = "⌨️ MECHANICAL MODE";
    }
    
    function resetGame() {
        if (timerInterval) clearInterval(timerInterval);
        gameActive = false;
        timeLeft = 60;
        totalTyped = 0;
        correctCount = 0;
        currentWPM = 0;
        updateStats();
        currentWord = getRandomWord();
        targetWordEl.innerText = currentWord;
        userInput.value = "";
        userInput.disabled = false;
        feedbackMsg.innerHTML = "✨ Reset. Press START to begin typing master challenge! ✨";
        feedbackMsg.classList.remove("success", "error");
        startBtn.innerText = "▶ START GAME";
        modeIndicator.innerText = "⚡ 60s Mode";
        userInput.disabled = true;
    }
    
    // Event listeners
    startBtn.addEventListener("click", () => {
        if (gameActive) {
            endGame();
        } else {
            startGame();
        }
    });
    
    resetBtn.addEventListener("click", () => {
        resetGame();
        if (timerInterval) clearInterval(timerInterval);
        gameActive = false;
        userInput.disabled = true;
    });
    
    userInput.addEventListener("keydown", (e) => {
        if (!gameActive && e.key !== 'Enter') {
            e.preventDefault();
            return;
        }
        // highlight key on physical press (RGB feedback)
        let keyPressed = e.key;
        if (keyPressed === ' ') keyPressed = ' ';
        else if (keyPressed === 'Enter') keyPressed = 'Enter';
        else if (keyPressed === 'Backspace') keyPressed = 'Backspace';
        highlightKey(keyPressed);
        
        if (e.key === 'Enter' && gameActive) {
            e.preventDefault();
            checkWord();
        }
    });
    
    // also listen for input change (auto-check for space? We'll check only when enter or if word length matches but better use Enter)
    // but also if user types full word and presses space? optional: we can add space trigger.
    userInput.addEventListener("keyup", (e) => {
        if (e.key === ' ' && gameActive) {
            e.preventDefault();
            checkWord();
        }
    });
    
    // disable initial input until start
    userInput.disabled = true;
    resetGame();
    // initial random word
    currentWord = getRandomWord();
    targetWordEl.innerText = currentWord;
    updateStats();
    
    // bonus: animate keyboard startup
    setTimeout(() => {
        const keys = document.querySelectorAll('.key');
        keys.forEach((k, idx) => {
            setTimeout(() => {
                k.style.transition = '0.1s';
                k.style.backgroundColor = `hsl(${idx * 15}, 80%, 55%)`;
                setTimeout(() => { k.style.backgroundColor = ''; }, 150);
            }, idx * 20);
        });
    }, 200);
</script>
</body>
</html>
